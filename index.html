<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKOUT TRACKER | V-TAPER</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #1a73e8;
            --cue-bg: #fff8e1;
            --cue-text: #855e00;
            --border: #333333;
            --input-bg: #2a2a2a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.4; }

        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header-left h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .date-sub { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
        .settings-btn { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 12px; cursor: pointer; }

        .tabs-container { display: flex; gap: 8px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab { background: var(--card); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; color: var(--text-dim); cursor: pointer; transition: all .15s; }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .tab.rest-tab { opacity: .5; cursor: default; }
        .tab.done-tab { background: #1a3a1a; color: #4caf50; border-color: #4caf50; }

        .progress-header { padding: 0 20px 12px; font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
        .prog-bar-bg { margin: 0 20px 12px; background: #2a2a2a; border-radius: 99px; height: 4px; overflow: hidden; }
        .prog-bar-fill { height: 4px; border-radius: 99px; background: var(--accent); transition: width .3s; }

        .rest-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin: 12px; padding: 40px 20px; text-align: center; }
        .rest-card i { font-size: 40px; color: var(--text-dim); margin-bottom: 12px; display: block; }
        .rest-card h2 { font-size: 18px; margin-bottom: 8px; }
        .rest-card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

        .exercise-card { background: var(--card); margin: 0 12px 12px; border-radius: 12px; padding: 16px; border: 1px solid var(--border); transition: border-color .2s; }
        .exercise-card.done { border-color: #4caf50; }
        .ex-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; cursor: pointer; }
        .check-circle { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .check-circle.done { background: #4caf50; border-color: #4caf50; }
        .check-circle.done i { color: white; font-size: 14px; }
        .check-circle i { color: transparent; font-size: 14px; }

        .ex-info { flex: 1; min-width: 0; }
        .ex-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
        .ex-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .rpe-tag { padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 11px; }
        .rpe7 { background: #1a3a1a; color: #4caf50; }
        .rpe8 { background: #3a2a00; color: #ffc107; }
        .rpe9 { background: #3a1a00; color: #ff9800; }
        .rpe10 { background: #3a0000; color: #f44336; }

        .chevron { font-size: 18px; color: var(--text-dim); transition: transform .2s; flex-shrink: 0; margin-top: 2px; }
        .exercise-card.open .chevron { transform: rotate(180deg); }

        .ex-body { display: none; }
        .exercise-card.open .ex-body { display: block; }

        .cue-box { background: var(--cue-bg); color: var(--cue-text); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; border-left: 4px solid #ffc107; line-height: 1.5; }

        .set-header { display: grid; grid-template-columns: 44px 1fr 1fr; gap: 8px; margin-bottom: 4px; }
        .set-header span { font-size: 11px; color: var(--text-dim); text-align: center; text-transform: uppercase; letter-spacing: .04em; }
        .set-header span:first-child { text-align: left; }
        .set-row { display: grid; grid-template-columns: 44px 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
        .set-label { font-size: 13px; color: var(--text-dim); }
        .input-field { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; text-align: center; font-size: 15px; width: 100%; font-family: inherit; }
        .input-field:focus { outline: none; border-color: var(--accent); }

        .btn-add-set { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 9px; border-radius: 8px; font-size: 13px; margin-top: 4px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 4px; }

        .footer-action { position: fixed; bottom: 0; left: 0; width: 100%; padding: 16px 20px; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
        .btn-complete { width: 100%; background: #1a3a1a; border: 1px solid #4caf50; color: #4caf50; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; font-family: inherit; transition: all .2s; }
        .btn-complete:disabled { background: #2a2a2a; border-color: var(--border); color: var(--text-dim); cursor: not-allowed; }

        /* Progress board */
        .pb { padding: 16px; }
        .pb-h { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .wk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .wk-c { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
        .wk-c.done { border-color: #4caf50; }
        .wk-c.restday { opacity: .5; }
        .wk-dl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
        .wk-nm { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .wk-c.done .wk-nm { color: #4caf50; }
        .wk-st { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
        .vol-c { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .vol-n { font-size: 30px; font-weight: 700; }
        .vol-l { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
        .streak-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .sdot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; border: 1px solid var(--border); color: var(--text-dim); background: var(--card); flex-shrink: 0; }
        .sdot.done { background: var(--accent); color: white; border-color: var(--accent); }
        .sdot.restday { opacity: .4; font-size: 9px; }
        .rst-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        /* Settings */
        .settings-panel { padding: 20px; }
        .settings-panel h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .settings-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .settings-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .settings-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 14px; }
        .select-field { width: 100%; background: var(--input-bg); color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 15px; font-family: inherit; cursor: pointer; }
        .back-btn { width: 100%; background: var(--accent); border: none; color: white; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Nav bar bottom (views) */
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<!-- DASHBOARD VIEW -->
<div id="view-dash" class="view active">
    <header>
        <div class="header-left">
            <h1><i class="ti ti-barbell" aria-hidden="true"></i> Workout tracker</h1>
            <p class="date-sub" id="display-date"></p>
        </div>
        <div class="settings-btn" onclick="showView('settings')" aria-label="Settings">
            <i class="ti ti-settings" style="font-size:20px"></i>
        </div>
    </header>

    <div class="tabs-container" id="day-tabs"></div>

    <div class="progress-header">
        <span id="exercise-count">0 / 0 exercises</span>
        <span id="progress-percent">0%</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>

    <div id="workout-content"></div>

    <div class="footer-action">
        <button class="btn-complete" id="complete-btn" onclick="completeWorkout()" disabled>Mark workout complete</button>
    </div>
</div>

<!-- PROGRESS BOARD VIEW -->
<div id="view-progress" class="view">
    <header>
        <div class="header-left">
            <h1><i class="ti ti-chart-bar" aria-hidden="true"></i> Progress board</h1>
        </div>
        <div class="settings-btn" onclick="showView('dash')" aria-label="Back">
            <i class="ti ti-arrow-left" style="font-size:20px"></i>
        </div>
    </header>
    <div class="pb">
        <div class="pb-h">Weekly overview</div>
        <div class="streak-row" id="streak-row"></div>
        <div class="wk-grid" id="wk-grid"></div>
        <div class="vol-c">
            <div class="vol-n" id="vol-n">0 kg</div>
            <div class="vol-l">total volume logged this week</div>
        </div>
        <button class="rst-btn" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true"></i> Reset all progress</button>
    </div>
</div>

<!-- SETTINGS VIEW -->
<div id="view-settings" class="view">
    <header>
        <div class="header-left">
            <h1><i class="ti ti-settings" aria-hidden="true"></i> Settings</h1>
        </div>
        <div class="settings-btn" onclick="showView('dash')" aria-label="Back">
            <i class="ti ti-arrow-left" style="font-size:20px"></i>
        </div>
    </header>
    <div class="settings-panel">
        <div class="settings-card">
            <h3>Active routine</h3>
            <p>Switch your training split</p>
            <select id="routine-select" class="select-field" onchange="switchRoutine()">
                <option value="4day">4-Day Split (Thu–Sun)</option>
                <option value="7day">7-Day Split (Mon–Sun)</option>
            </select>
        </div>
        <button class="back-btn" onclick="showView('dash')"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to dashboard</button>
    </div>
</div>

    }
};

const DAY_LABELS = { mon:"Mon", tue:"Tue", wed:"Wed", thu:"Thu", fri:"Fri", sat:"Sat", sun:"Sun" };

let db = JSON.parse(localStorage.getItem('gym_v2') || '{}');
if (!db.split) db.split = "7day";
if (!db.chk) db.chk = {};
if (!db.sets) db.sets = {};
if (!db.done) db.done = {};
if (!db.vol) db.vol = 0;
let curDay = null;
let openCards = {};

function save() { localStorage.setItem('gym_v2', JSON.stringify(db)); }

function showView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    if (v === 'dash') renderAll();
    if (v === 'progress') renderProgress();
}

function switchRoutine() {
    db.split = document.getElementById('routine-select').value;
    curDay = null;
    save();
    showView('dash');
}

function getAutoDay() {
    const map = ['sun','mon','tue','wed','thu','fri','sat'];
    const today = map[new Date().getDay()];
    const split = SPLITS[db.split];
    if (split.days[today]) return today;
    return split.order[0];
}

function renderTabs() {
    const split = SPLITS[db.split];
    const container = document.getElementById('day-tabs');
    container.innerHTML = '';
    split.order.forEach(dk => {
        const d = split.days[dk];
        const tab = document.createElement('div');
        let cls = 'tab';
        if (dk === curDay) cls += ' active';
        else if (d.rest) cls += ' rest-tab';
        else if (db.done[db.split + ':' + dk]) cls += ' done-tab';
        tab.className = cls;
        tab.textContent = DAY_LABELS[dk] + ' — ' + d.name;
        if (!d.rest || dk === curDay) tab.onclick = () => { curDay = dk; renderAll(); };
        container.appendChild(tab);
    });
}

function renderWorkout() {
    const split = SPLITS[db.split];
    const day = split.days[curDay];
    const container = document.getElementById('workout-content');
    container.innerHTML = '';

    if (day.rest) {
        container.innerHTML = `<div class="rest-card">
            <i class="ti ti-moon" aria-hidden="true"></i>
            <h2>${day.name} day</h2>
            <p>${day.restMsg}</p>
        </div>`;
        document.getElementById('exercise-count').textContent = 'Rest day';
        document.getElementById('progress-percent').textContent = '';
        document.getElementById('prog-fill').style.width = '0%';
        document.getElementById('complete-btn').disabled = true;
        return;
    }

    day.exercises.forEach((ex, i) => {
        const key = db.split + ':' + curDay + ':' + i;
        const isDone = !!db.chk[key];
        const isOpen = !!openCards[key];
        const sets = db.sets[key] || [{ w: '', r: '' }];
        const rpeClass = 'rpe' + Math.min(ex.rpe, 10);

        const card = document.createElement('div');
        card.className = 'exercise-card' + (isDone ? ' done' : '') + (isOpen ? ' open' : '');

        const hdr = document.createElement('div');
        hdr.className = 'ex-header';
        hdr.innerHTML = `
            <div class="check-circle${isDone ? ' done' : ''}" id="chk-${i}">
                <i class="ti ti-check" aria-hidden="true"></i>
            </div>
            <div class="ex-info">
                <h3>${ex.name}</h3>
                <div class="ex-meta">
                    <span>${ex.sets} sets &bull; ${ex.reps} reps &bull; rest ${ex.rest}</span>
                    <span class="rpe-tag ${rpeClass}">RPE ${ex.rpe}</span>
                </div>
            </div>
            <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
        `;
        hdr.querySelector('.check-circle').onclick = (e) => { e.stopPropagation(); toggleDone(key, i, ex); };
        hdr.onclick = () => { openCards[key] = !openCards[key]; renderWorkout(); };

        let setRows = '';
        sets.forEach((s, si) => {
            setRows += `<div class="set-row">
                <span class="set-label">Set ${si + 1}</span>
                <input type="number" class="input-field" placeholder="kg" value="${s.w}" inputmode="decimal" onchange="updSet('${key}',${si},'w',this.value)">
                <input type="number" class="input-field" placeholder="reps" value="${s.r}" inputmode="numeric" onchange="updSet('${key}',${si},'r',this.value)">
            </div>`;
        });

        const body = document.createElement('div');
        body.className = 'ex-body';
        body.innerHTML = `
            <div class="cue-box"><strong>Coach:</strong> ${ex.cue}</div>
            <div class="set-header">
                <span></span><span>Weight</span><span>Reps</span>
            </div>
            <div id="sets-${i}">${setRows}</div>
            <button class="btn-add-set" onclick="addSet('${key}',${i})"><i class="ti ti-plus" aria-hidden="true"></i> Add set</button>
        `;

        card.appendChild(hdr);
        card.appendChild(body);
        container.appendChild(card);
    });

    updateProg();
}

function toggleDone(key, i, ex) {
    const was = db.chk[key];
    db.chk[key] = !was;
    if (!was) {
        (db.sets[key] || []).forEach(s => {
            db.vol = Math.round((db.vol || 0) + (parseFloat(s.w) || 0) * (parseFloat(s.r) || 0));
        });
    }
    save(); renderWorkout();
}

function updSet(key, si, field, val) {
    if (!db.sets[key]) db.sets[key] = [{ w: '', r: '' }];
    db.sets[key][si][field] = val;
    save();
}

function addSet(key, i) {
    if (!db.sets[key]) db.sets[key] = [{ w: '', r: '' }];
    db.sets[key].push({ w: '', r: '' });
    save(); renderWorkout();
}

function updateProg() {
    const day = SPLITS[db.split].days[curDay];
    if (!day || day.rest) return;
    const total = day.exercises.length;
    const done = day.exercises.filter((_, i) => db.chk[db.split + ':' + curDay + ':' + i]).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('exercise-count').textContent = done + ' / ' + total + ' exercises';
    document.getElementById('progress-percent').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('complete-btn').disabled = done < total;
}

function completeWorkout() {
    db.done[db.split + ':' + curDay] = true;
    save(); renderAll(); showView('progress');
}

function renderProgress() {
    const split = SPLITS[db.split];
    const sr = document.getElementById('streak-row');
    sr.innerHTML = '';
    let cnt = 0;
    split.order.forEach(dk => {
        const d = split.days[dk];
        const el = document.createElement('div');
        const isDone = !!db.done[db.split + ':' + dk];
        if (d.rest) {
            el.className = 'sdot restday';
            el.textContent = 'Rest';
        } else {
            el.className = 'sdot' + (isDone ? ' done' : '');
            el.textContent = DAY_LABELS[dk].slice(0, 2);
            if (isDone) cnt++;
        }
        sr.appendChild(el);
    });
    const lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:13px;color:var(--text-dim);margin-left:4px';
    const trainDays = split.order.filter(dk => !split.days[dk].rest).length;
    lbl.textContent = cnt + '/' + trainDays + ' done';
    sr.appendChild(lbl);

    const wg = document.getElementById('wk-grid');
    wg.innerHTML = '';
    split.order.forEach(dk => {
        const d = split.days[dk];
        const isDone = !!db.done[db.split + ':' + dk];
        const div = document.createElement('div');
        div.className = 'wk-c' + (isDone ? ' done' : '') + (d.rest ? ' restday' : '');
        if (d.rest) {
            div.innerHTML = `<div class="wk-dl">${DAY_LABELS[dk]}</div><div class="wk-nm">${d.name}</div><div class="wk-st"><i class="ti ti-moon" style="font-size:12px" aria-hidden="true"></i> Rest</div>`;
        } else {
            const total = d.exercises.length;
            const chkd = d.exercises.filter((_, i) => db.chk[db.split + ':' + dk + ':' + i]).length;
            div.innerHTML = `<div class="wk-dl">${DAY_LABELS[dk]}</div><div class="wk-nm">${d.name}</div>
                <div class="wk-st">${isDone ? '<i class="ti ti-circle-check" style="font-size:12px;color:#4caf50" aria-hidden="true"></i> Complete' : chkd + '/' + total + ' exercises'}</div>`;
        }
        wg.appendChild(div);
    });

    document.getElementById('vol-n').textContent = (db.vol || 0).toLocaleString() + ' kg';
}

function resetAll() {
    if (confirm('Reset all progress? This cannot be undone.')) {
        db = { split: db.split, chk: {}, sets: {}, done: {}, vol: 0 };
        openCards = {};
        save(); renderAll();
    }
}

function renderAll() {
    if (!curDay) curDay = getAutoDay();
    document.getElementById('routine-select').value = db.split;
    renderTabs();
    renderWorkout();
}

document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
renderAll();
</script>
</body>
</html>
