<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKOUT TRACKER | V-TAPER</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #1a73e8;
            --cue-bg: #fff8e1;
            --cue-text: #855e00;
            --border: #333333;
            --input-bg: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.4; }

        header { padding: 20px; border-bottom: 1px solid var(--border); }
        h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .date-sub { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

        /* Tabs */
        .tabs-container { 
            display: flex; 
            gap: 8px; 
            padding: 15px 20px; 
            overflow-x: auto; 
            scrollbar-width: none;
        }
        .tab {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-dim);
            cursor: pointer;
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .progress-header { padding: 0 20px; font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 10px; }

        /* Exercise Cards */
        .exercise-card {
            background: var(--card);
            margin: 0 12px 12px;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .ex-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
        .check-circle { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
        .check-circle.done { background: var(--accent); border-color: var(--accent); position: relative; }
        .check-circle.done::after { content: '✓'; position: absolute; color: white; font-size: 14px; left: 5px; top: 1px; }

        .ex-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .ex-meta { font-size: 13px; color: var(--text-dim); display: flex; gap: 8px; align-items: center; }
        .rpe-tag { background: #333; color: #4dabf7; padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 11px; }

        .cue-box {
            background: var(--cue-bg);
            color: var(--cue-text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .set-label { font-size: 13px; color: var(--text-dim); }
        .input-field {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
        }

        .btn-add-set {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
        }

        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
        }
        .btn-complete {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        /* Stats View */
        .stats-view { display: none; padding: 20px; }
        .active-view { display: block; }
    </style>
</head>
<body>

    <div id="dash-view" class="active-view">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border);">
            <div>
                <h1 style="font-size: 22px; font-weight: 700;"><i class="ti ti-barbell"></i> Workout tracker</h1>
                <p class="date-sub" id="display-date"></p>
            </div>
            <div style="background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 12px; cursor: pointer;" onclick="showView('settings')">
                <i class="ti ti-settings" style="font-size: 20px; color: var(--text);"></i>
            </div>
        </header>

        <div class="tabs-container" id="day-tabs"></div>

        <div class="progress-header">
            <span id="exercise-count">0 / 0 exercises</span>
            <span id="progress-percent">0%</span>
        </div>

        <div id="workout-content"></div>

        <div class="footer-action">
            <button class="btn-complete" onclick="completeWorkout()">Mark workout complete</button>
        </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="stats-view" style="padding: 20px;">
        <header style="margin-bottom: 20px;">
            <h1 style="font-size: 22px; font-weight: 700;">⚙️ Settings</h1>
        </header>
        
        <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px;">
            <h3 style="font-size: 16px; margin-bottom: 8px;">Active Routine</h3>
            <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 16px;">Switch your training split</p>
            <select id="routine-select" class="input-field" onchange="switchRoutine()" style="width: 100%; text-align: left; background: var(--input-bg); color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 15px;">
                <option value="4-Day Uni Split">4-Day Uni Split</option>
                <option value="7-Day Pre-Uni Split">7-Day Pre-Uni Split</option>
            </select>
        </div>

        <button class="btn-add-set" onclick="showView('dash')" style="margin-top: 20px; background: var(--accent); border: none; font-weight: 600;">Back to Dashboard</button>
    </div>

    <script>
        // --- DATA STRUCTURE ---
        const SPLITS = {
            "4-Day Uni Split": {
                mon: {
                    name: "Push",
                    exercises: [
                        { id: "p1", name: "Incline barbell press", sets: 4, reps: "6-8", rest: 150, rpe: 8, cue: "30° incline. Pause 1s at chest. Full ROM. Upper chest emphasis." },
                        { id: "p2", name: "Flat DB press", sets: 3, reps: "10-12", rest: 90, rpe: 8, cue: "Full stretch at bottom. Squeeze hard at top. Don't flare elbows." },
                        { id: "p3", name: "Cable lateral raise (unilateral)", sets: 4, reps: "15-20", rest: 60, rpe: 9, cue: "KEY EXERCISE. Lead with elbow, not wrist. Slow 3s eccentric. Cable at ankle height." },
                        { id: "p4", name: "Machine shoulder press", sets: 3, reps: "10-12", rest: 90, rpe: 8, cue: "Don't lock out at top. Controlled. Full range." },
                        { id: "p5", name: "Tricep rope pushdown", sets: 3, reps: "12-15", rest: 60, rpe: 8, cue: "Elbows pinned. Spread rope at bottom. Feel long head stretch at top." },
                        { id: "p6", name: "Overhead DB tricep extension", sets: 3, reps: "10-12", rest: 75, rpe: 8, cue: "Slow on the way down. Elbows don't flare. Max long head stretch." },
                        { id: "p7", name: "Cable chest fly (cross-body)", sets: 3, reps: "15", rest: 60, rpe: 7, cue: "High-to-low. Squeeze at centre. Optional if low energy." }
                    ]
                },
                tue: {
                    name: "Pull",
                    exercises: [
                        { id: "pl1", name: "Pull-up or lat pulldown", sets: 4, reps: "6-10", rest: 150, rpe: 9, cue: "Wide grip. Initiate with lats. Pull elbows to pockets." },
                        { id: "pl2", name: "Seated cable row (wide grip)", sets: 4, reps: "10-12", rest: 90, rpe: 8, cue: "Chest to pad, full stretch forward, hard squeeze. Row to lower sternum." },
                        { id: "pl3", name: "Face pull (rope, high cable)", sets: 4, reps: "15-20", rest: 60, rpe: 8, cue: "Pull to forehead. Externally rotate at end. Hold 2s." },
                        { id: "pl4", name: "DB rear delt fly (bent over)", sets: 3, reps: "15", rest: 60, rpe: 8, cue: "Chest on incline bench. Lead with elbows. Don't shrug. 3s eccentric." },
                        { id: "pl5", name: "EZ bar curl (standing)", sets: 4, reps: "8-10", rest: 90, rpe: 8, cue: "No swinging. Full extension. Supinate at top. Slow 3s down." },
                        { id: "pl6", name: "Incline DB curl", sets: 3, reps: "10-12", rest: 75, rpe: 9, cue: "Elbows behind body. Long head stretch. This builds the peak." },
                        { id: "pl7", name: "Hammer curl (cross-body)", sets: 3, reps: "12", rest: 60, rpe: 8, cue: "Alternating, controlled. Builds brachialis width." }
                    ]
                },
                wed: { name: "REST DAY", exercises: [] },
                thu: {
                    name: "Shoulders + Arms",
                    exercises: [
                        { id: "sa1", name: "DB lateral raise — heavy", sets: 5, reps: "12-15", rest: 75, rpe: 9, cue: "Week 3-4: drop set on final set — drop 40%, grind 10 more reps." },
                        { id: "sa2", name: "Cable lateral raise (unilateral)", sets: 4, reps: "15-20", rest: 60, rpe: 10, cue: "Different angle from DB. Same elbow-lead cue. 3s eccentric." },
                        { id: "sa3", name: "Arnold press", sets: 3, reps: "10-12", rest: 90, rpe: 8, cue: "Hits all 3 delt heads. Rotate slowly. Don't ego-heavy." },
                        { id: "sa4", name: "Close-grip bench press", sets: 4, reps: "8-10", rest: 120, rpe: 8, cue: "Shoulder-width grip. Lock out hard at top. 3s eccentric." },
                        { id: "sa5", name: "EZ bar skull crusher", sets: 3, reps: "10-12", rest: 75, rpe: 8, cue: "Lower to forehead. Elbows vertical. Full extension." },
                        { id: "sa6", name: "Concentration curl", sets: 3, reps: "12-15", rest: 60, rpe: 9, cue: "Full supination. Peak squeeze 2s. Slow down. No momentum." },
                        { id: "sa7", name: "Cable curl (supinated)", sets: 3, reps: "12-15", rest: 60, rpe: 10, cue: "Partials on final set — squeeze bottom half for 10 more after failure." }
                    ]
                },
                fri: { name: "Rest / Football ⚽", exercises: [] },
                sat: {
                    name: "Legs + Core",
                    exercises: [
                        { id: "lc1", name: "Barbell back squat", sets: 4, reps: "6-8", rest: 150, rpe: 8, cue: "Break parallel. Brace core. Drive knees out. Do NOT skip this." },
                        { id: "lc2", name: "Romanian deadlift (RDL)", sets: 4, reps: "10-12", rest: 120, rpe: 8, cue: "Hip hinge, soft knees, bar on legs. Hamstring stretch is the point." },
                        { id: "lc3", name: "Leg press", sets: 3, reps: "12-15", rest: 90, rpe: 8, cue: "High wide foot = glute/ham emphasis. Full ROM — no quarter reps." },
                        { id: "lc4", name: "Leg curl (lying or seated)", sets: 3, reps: "12-15", rest: 75, rpe: 9, cue: "Full stretch. Squeeze hard at peak. 2s hold." },
                        { id: "lc5", name: "Hanging leg raise", sets: 3, reps: "12-15", rest: 60, rpe: 8, cue: "Posterior tilt at top. Don't swing." },
                        { id: "lc6", name: "Plank (weighted)", sets: 3, reps: "45-60s", rest: 60, rpe: 8, cue: "Squeeze glutes and abs simultaneously. Don't let hips sag." },
                        { id: "lc7", name: "Cable crunch (kneeling)", sets: 3, reps: "15-20", rest: 60, rpe: 8, cue: "Round your spine. Elbow-to-knees. Not a hip flexor exercise." }
                    ]
                },
                sun: { name: "REST DAY", exercises: [] }
            },
            "7-Day Pre-Uni Split": {
                mon: { name: "Full Body A", exercises: [{ id: "fb1", name: "Compound Lift", sets: 3, reps: "8-10", rest: 120, rpe: 8, cue: "Focus on form." }] },
                tue: { name: "Full Body B", exercises: [{ id: "fb2", name: "Isolation Lift", sets: 3, reps: "12-15", rest: 60, rpe: 7, cue: "Mind-muscle connection." }] },
                wed: { name: "REST", exercises: [] },
                thu: { name: "Full Body C", exercises: [{ id: "fb3", name: "Compound Lift", sets: 3, reps: "8-10", rest: 120, rpe: 8, cue: "Focus on form." }] },
                fri: { name: "Full Body D", exercises: [{ id: "fb4", name: "Isolation Lift", sets: 3, reps: "12-15", rest: 60, rpe: 7, cue: "Mind-muscle connection." }] },
                sat: { name: "REST", exercises: [] },
                sun: { name: "Weak Point Work", exercises: [{ id: "fb5", name: "Accessories", sets: 3, reps: "15-20", rest: 60, rpe: 8, cue: "Finish strong." }] }
            }
        };

        // --- STATE MANAGEMENT ---
        let db = JSON.parse(localStorage.getItem('gym_pwa_data') || '{}');
        if (!db.settings) db.settings = { activeSplit: "4-Day Uni Split" };
        function saveDB() { localStorage.setItem('gym_pwa_data', JSON.stringify(db)); }

        // --- APP LOGIC ---
        function showView(viewId) {
            document.getElementById('dash-view').style.display = viewId === 'dash' ? 'block' : 'none';
            document.getElementById('settings-view').style.display = viewId === 'settings' ? 'block' : 'none';
            if (viewId === 'dash') renderDayTabs();
        }

        function switchRoutine() {
            db.settings.activeSplit = document.getElementById('routine-select').value;
            saveDB();
            const d = new Date();
            const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            loadWorkout(days[d.getDay()]);
            showView('dash');
        }

        function renderDayTabs() {
            const tabsContainer = document.getElementById('day-tabs');
            tabsContainer.innerHTML = '';
            const activeSplit = db.settings.activeSplit;
            const routine = SPLITS[activeSplit];
            const daysOrder = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
            
            daysOrder.forEach(day => {
                const tab = document.createElement('div');
                tab.className = 'tab';
                tab.id = `tab-${day}`;
                const label = routine[day].name || "REST";
                tab.innerText = `${day.charAt(0).toUpperCase() + day.slice(1)}: ${label}`;
                tab.onclick = () => loadWorkout(day);
                tabsContainer.appendChild(tab);
            });
        }

        function loadWorkout(dayKey) {
            const activeSplit = db.settings.activeSplit;
            const routine = SPLITS[activeSplit];
            const dayData = routine[dayKey];

            // Update Tabs UI
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${dayKey}`);
            if (activeTab) activeTab.classList.add('active');

            const container = document.getElementById('workout-content');
            container.innerHTML = '';
            
            if (!dayData.exercises || dayData.exercises.length === 0) {
                container.innerHTML = `
                    <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin: 12px; padding: 40px 20px; text-align: center;">
                        <h2 style="font-size: 18px; margin-bottom: 8px;">${dayData.name}</h2>
                        <p style="color: var(--text-dim); font-size: 14px;">Focus on recovery and quality nutrition.</p>
                    </div>
                `;
                document.getElementById('exercise-count').innerText = "0 / 0 exercises";
                document.getElementById('progress-percent').innerText = "0%";
                return;
            }

            document.getElementById('exercise-count').innerText = `0 / ${dayData.exercises.length} exercises`;

            dayData.exercises.forEach((ex, idx) => {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.innerHTML = `
                    <div class="ex-header">
                        <div class="check-circle" id="check-${idx}" onclick="toggleDone(${idx})"></div>
                        <div class="ex-info">
                            <h3>${ex.name}</h3>
                            <div class="ex-meta">
                                <span>${ex.sets} sets • ${ex.reps} reps • ${ex.rest}s rest</span>
                                <span class="rpe-tag">RPE ${ex.rpe}</span>
                            </div>
                        </div>
                    </div>
                    <div class="cue-box"><b>COACH:</b> ${ex.cue}</div>
                    <div id="sets-container-${idx}">
                        <div class="set-row">
                            <span class="set-label">Set 1</span>
                            <input type="number" class="input-field" placeholder="kg">
                            <input type="number" class="input-field" placeholder="reps">
                        </div>
                    </div>
                    <button class="btn-add-set" onclick="addSet(${idx})">+ Add set</button>
                `;
                container.appendChild(card);
            });
            updateProgress();
        }

        function addSet(exIdx) {
            const container = document.getElementById(`sets-container-${exIdx}`);
            const setNum = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'set-row';
            div.innerHTML = `
                <span class="set-label">Set ${setNum}</span>
                <input type="number" class="input-field" placeholder="kg">
                <input type="number" class="input-field" placeholder="reps">
            `;
            container.appendChild(div);
        }

        function toggleDone(idx) {
            const el = document.getElementById(`check-${idx}`);
            el.classList.toggle('done');
            updateProgress();
        }

        function updateProgress() {
            const cards = document.querySelectorAll('.exercise-card');
            if (cards.length === 0) return;
            const done = document.querySelectorAll('.check-circle.done').length;
            const total = cards.length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('exercise-count').innerText = `${done} / ${total} exercises`;
            document.getElementById('progress-percent').innerText = `${percent}%`;
        }

        function completeWorkout() {
            alert("Great session! Progress logged to local storage.");
        }

        // Initialize App
        window.onload = () => {
            const d = new Date();
            const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const currentDay = days[d.getDay()];
            
            document.getElementById('display-date').innerText = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('routine-select').value = db.settings.activeSplit;

            renderDayTabs();
            loadWorkout(currentDay);
        };
    </script>
</body>
</html>
